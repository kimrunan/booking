<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Plassbooking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-color: #f8f8f8;
    }

    h2 {
      margin-top: 20px;
    }

    #bookingStatus {
      color: red;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #bookingWrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 20px;
    }

    .map-container {
      position: relative;
      max-width: 90vw;
      width: 100%;
    }

    .map-image {
      width: 100%;
      height: auto;
      border: 1px solid #ccc;
    }

    .seat {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: white;
      background-color: green;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .opptatt {
      background-color: red;
      pointer-events: none;
      opacity: 0.7;
    }

    #bookedList {
      background-color: white;
      border: 1px solid #ddd;
      padding: 10px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #bookedList ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #bookedList li {
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    #popupForm {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 999;
    }

    #popupForm input[type="text"] {
      padding: 6px;
      width: 100%;
      margin-bottom: 10px;
    }

    #popupForm button {
      padding: 6px 12px;
      margin-right: 10px;
    }

    @media (min-width: 768px) {
      #bookingWrapper {
        flex-direction: row;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <h2>Velg en ledig plass</h2>
  <p id="bookingStatus"></p>

  <div id="bookingWrapper">
    <div class="map-container">
      <img src="plasskart.png" alt="Plasskart" class="map-image">
      <div id="seats">
        <div class="seat" style="top: 41%; left: 63%;" data-plass="1">1</div>
        <div class="seat" style="top: 46%; left: 67%;" data-plass="2">2</div>
        <div class="seat" style="top: 60%; left: 74%;" data-plass="3">3</div>
        <div class="seat" style="top: 65%; left: 66%;" data-plass="4">4</div>
        <div class="seat" style="top: 73%; left: 57%;" data-plass="5">5</div>
        <div class="seat" style="top: 53%; left: 57%;" data-plass="6">6</div>
        <div class="seat" style="top: 79%; left: 42%;" data-plass="7">7</div>
        <div class="seat" style="top: 70%; left: 46%;" data-plass="8">8</div>
        <div class="seat" style="top: 38%; left: 49%;" data-plass="9">9</div>
        <div class="seat" style="top: 31%; left: 42%;" data-plass="10">10</div>
        <div class="seat" style="top: 26%; left: 27%;" data-plass="11">11</div>
        <div class="seat" style="top: 19%; left: 20%;" data-plass="12">12</div>
      </div>
    </div>

    <div id="bookedList">
      <h3>🪑 Bookede plasser:</h3>
      <ul id="bookedItems"></ul>
    </div>
  </div>

  <div id="popupForm">
    <form id="bookingForm">
      <input type="hidden" id="plassnummer" name="plassnummer">
      <label for="navn">Navn:</label><br>
      <input type="text" id="navn" name="navn" required><br>
      <button type="submit">Book</button>
      <button type="button" onclick="closeForm()">Avbryt</button>
    </form>
  </div>
  <div id="bookingInfo" class="booking-info hidden">
    <div class="booking-header">
        <span id="bookingIcon">🚐</span>
        <h3 id="bookingTitle">Plass 01</h3>
    </div>

    <div class="booking-status ledig" id="bookingStatus">
        Ledig
    </div>

    <div id="bookingDetails" class="hidden">
        <p><strong>Booket av:</strong></p>
        <p id="bookingName">Ola Nordmann</p>

        <p><strong>Fra:</strong></p>
        <p id="bookingFrom">01.08.2026</p>

        <p><strong>Til:</strong></p>
        <p id="bookingTo">05.08.2026</p>
    </div>
</div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzlsArraMIZEb7vZcE8my5qiP2ViPG_paz4A6xVidtBoFv5GFONvwu4Um2mXQoaHfwfSA/exec";
    const form = document.getElementById("bookingForm");
    const popup = document.getElementById("popupForm");
    const plassnummerInput = document.getElementById("plassnummer");
    const navnInput = document.getElementById("navn");
    const bookedList = document.getElementById("bookedItems");
    const statusBox = document.getElementById("bookingStatus");

    const bookingStart = new Date("2026-06-01T00:00:00");
    const bookingEnd = new Date("2026-08-5T23:59:59");
    const today = new Date();
    let bookingÅpen = true;

    if (today < bookingStart) {
      statusBox.textContent = "Booking åpner " + bookingStart.toLocaleDateString("no-NO");
      bookingÅpen = false;
    } else if (today > bookingEnd) {
      statusBox.textContent = "Booking er stengt";
      bookingÅpen = false;
    }

    function openForm(plassNr) {
      if (!bookingÅpen) return;
      plassnummerInput.value = plassNr;
      navnInput.value = "";
      popup.style.display = "block";
    }

    function closeForm() {
      popup.style.display = "none";
    }

    document.querySelectorAll(".seat").forEach(btn => {
      if (!bookingÅpen) {
        btn.classList.add("opptatt");
        btn.title = "Booking er stengt";
        return;
      }

      btn.addEventListener("click", () => {
        const nr = btn.getAttribute("data-plass");
        openForm(nr);
      });
    });

    form.addEventListener("submit", e => {
      e.preventDefault();
      const data = new FormData(form);
      data.append("timestamp", new Date().toISOString());

      fetch(scriptURL, {
        method: "POST",
        body: data
      }).then(() => {
        alert("Plass booket!");
        location.reload();
      }).catch(err => alert("Feil: " + err.message));
    });

    fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSWeVLX-_EP_glVBrHjj4FtpaSe0jhZyv06OQPruEiso18V_pIEON82yHUX2S1WE1RckemMIOFx9a-a/pub?output=csv")
      .then(res => res.text())
      .then(csv => {
        const lines = csv.trim().split("\n").slice(1);
        const opptattPlasser = new Set();
        const bookings = [];

        lines.forEach(row => {
          const columns = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
          if (columns && columns.length >= 3) {
            const plass = columns[1].replace(/^"|"$/g, "").trim();
            const navn = columns[2].replace(/^"|"$/g, "").trim();
            if (navn) {
              bookings.push({ plass: plass, navn: navn });
              if (plass) opptattPlasser.add(plass);
            }
          }
        });

        bookings.sort((a, b) => parseInt(a.plass) - parseInt(b.plass));
        bookings.forEach(b => {
          bookedList.innerHTML += `<li>${b.plass}: ${b.navn}</li>`;
        });

        document.querySelectorAll(".seat").forEach(btn => {
          if (opptattPlasser.has(btn.getAttribute("data-plass"))) {
            btn.classList.add("opptatt");
          }
        });
      });
  </script>
</body>
</html>
